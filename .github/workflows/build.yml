name: Build

on:
  push:
    branches: ["**"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - run: npm run format:check

      - run: npm run typecheck

      - run: npm test

      - run: npm run build

      - name: Check dist is up to date
        run: |
          git diff --exit-code dist/ || (echo "dist/ is out of date. Run 'npm run build' and commit the result." && exit 1)
